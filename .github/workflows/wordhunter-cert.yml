name: Word Hunter cert tooling

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  cert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install -r requirements-dev.txt
      - name: Unit tests
        run: python -m pytest tests/test_wordhunter_cert.py -v
      - name: Puzzle file pairing
        run: python -m tools.wordhunter_cert check-pairing
