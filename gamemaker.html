<!doctype html>
<html lang="en">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Word Hunter — gamemaker</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="stylesheet" type="text/css" href="gamemaker.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
  </head>
  <body class="gamemaker-page">
    <div id="page-background" aria-hidden="true"></div>
    <div class="gamemaker-header">
      <img id="logo" src="images/logo.png" alt="logo" />
    </div>
    <div class="gamemaker-toolbar" aria-live="polite">
      <div class="gamemaker-score-slot">
        <div id="gamemaker-target" class="gamemaker-label-word gamemaker-target">—</div>
      </div>
      <div id="gamemaker-meta" class="gamemaker-label-stats gamemaker-meta"></div>
      <div class="gamemaker-btn-row">
        <div class="gamemaker-btn-group">
          <button type="button" id="gamemaker-btn-list" class="gamemaker-btn">
            reset
          </button>
          <button type="button" id="gamemaker-btn-word-swap" class="gamemaker-btn">
            word
          </button>
          <button type="button" id="gamemaker-btn-export" class="gamemaker-btn">
            export
          </button>
        </div>
      </div>
    </div>

    <div id="grid-line-wrapper">
      <div id="grid-viewport" class="grid-viewport">
        <div id="grid-pan" class="grid-pan">
          <div id="grid-stage" class="grid-stage">
            <div
              id="shift-preview-strip"
              class="shift-preview-strip shift-preview-strip--hidden"
              aria-hidden="true"
            >
              <div class="shift-preview-inner"></div>
            </div>
            <div id="grid"></div>
          </div>
        </div>
      </div>
      <svg id="line-container"></svg>
    </div>

    <div id="bottom-dock">
      <div
        id="board-shift-zone"
        class="visibleDisplay"
        aria-label="Swipe or click and drag here to rearrange the grid. Double-tap or double click to end the game. Tap once here to hide these instructions."
      >
        <div id="board-shift-hints">
          <span id="board-shift-hint">
            <span class="board-shift-hint--coarse"
              ><span class="board-shift-hint-accent--drag">Swipe here</span> to
              rearrange grid</span
            >
            <span class="board-shift-hint--fine"
              ><span class="board-shift-hint-accent--drag">Click &amp; drag here</span>
              to rearrange grid</span
            >
          </span>
          <span id="board-shift-end-hint">
            <span class="board-shift-hint--coarse"
              >Double tap to
              <span class="board-shift-hint-accent--endgame">end game</span></span
            >
            <span class="board-shift-hint--fine"
              >Double click to
              <span class="board-shift-hint-accent--endgame">end game</span></span
            >
          </span>
        </div>
      </div>
    </div>
    <script type="module" src="js/gamemaker/app.js"></script>
  </body>
</html>
